name: Weekly Price Update

on:
  schedule:
    - cron: '0 5 * * 1'  # כל יום שני בשעה 5:00 UTC (8:00 ישראל)
  workflow_dispatch:       # אפשרות להרצה ידנית

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # נדרש לעדכון קבצים ב-repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scrapers/scrape.py

      - name: Build HTML
        run: python scrapers/build_html.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Update prices $(date +'%d.%m.%Y')"
          git pull --rebase origin main
          git push

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=output --auth=$NETLIFY_AUTH_TOKEN --site=$NETLIFY_SITE_ID
